<!DOCTYPE html>
<html>
<head>
  <title>Result</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Your Result</h2>
<h3 id="result"></h3>

<script>
  const score = localStorage.getItem("score");
  const total = localStorage.getItem("total");

  document.getElementById("result").innerText =
    `Your Score: ${score} / ${total}`;
</script>

</body>
</html>
